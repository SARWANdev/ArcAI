<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF Viewer with Zoom</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.16.0/pdf-lib.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; height: 100vh; overflow: hidden; }
        #pdf-container { 
            width: 100%; 
            height: calc(100% - 50px); 
            position: relative; 
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
            box-sizing: border-box;
        }
        #toolbar {
            height: 50px; background: #f0f0f0; display: flex; align-items: center;
            padding: 0 10px; gap: 10px; border-bottom: 1px solid #ccc;
            flex-shrink: 0;
        }
        .highlight {
            position: absolute;
            background-color: rgba(255, 255, 0, 0.3);
            border-radius: 2px;
            pointer-events: none;
            box-sizing: border-box;
            z-index: 0;
        }
        .search-highlight {
            position: absolute;
            background-color: rgba(135, 206, 235, 0.4);
            border-radius: 2px;
            pointer-events: none;
            box-sizing: border-box;
            z-index: 1;
        }
        canvas { 
            display: block; 
            box-shadow: 0 0 5px rgba(0,0,0,0.2); 
            background-color: white;
            position: relative;
            z-index: 0;
            transition: transform 0.2s ease;
        }
        button {
            padding: 5px 10px; background: #4a6baf; color: white;
            border: none; border-radius: 3px; cursor: pointer;
        }
        button:hover { background: #3a5a9f; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        #highlight-btn {
            background-color: #ffeb3b;
            color: #000;
        }
        #highlight-btn.active {
            background-color: #ffc107;
        }
        #page-info { margin: 0 10px; min-width: 100px; text-align: center; }
        #search-input {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
            flex-grow: 1;
            max-width: 200px;
        }
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
        }
        .zoom-controls button {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        #zoom-level {
            min-width: 50px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <button id="prev-page">Previous</button>
        <span id="page-info">Page 1 of 1</span>
        <button id="next-page">Next</button>
        <button id="highlight-btn">Highlight</button>
        <input type="text" id="search-input" placeholder="Search text...">
        <button id="search-btn">Search</button>
        <div class="zoom-controls">
            <button id="zoom-out" title="Zoom Out">-</button>
            <span id="zoom-level">150%</span>
            <button id="zoom-in" title="Zoom In">+</button>
        </div>
        <button id="save-pdf">Save PDF</button>
    </div>
    <div id="pdf-container"></div>

    <script>
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        let pdfDoc = null;
        let currentPage = 1;
        let pageRendering = false;
        let pageNumPending = null;
        let highlights = [];
        let searchHighlights = [];
        let canvas = null;
        let viewport = null;
        let isHighlightMode = false;
        let isHighlighting = false;
        let highlightStartX, highlightStartY;
        let currentPdfJsPage = null;
        let tempHighlightEl = null;
        let currentScale = 1.5; // Initial zoom level (150%)
        const SCALE_INCREMENT = 0.25; // Zoom step size

        // Listen for messages from parent
        window.addEventListener("message", (event) => {
            if (event.data.type === "LOAD_PDF") {
                const pdfBytes = new Uint8Array(event.data.pdfBytes);
                loadPDF(pdfBytes);
            }
        });

        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';

        async function loadPDF(pdfBytes) {
            pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes }).promise;
            document.getElementById('page-info').textContent = `Page 1 of ${pdfDoc.numPages}`;
            currentPage = 1;
            highlights = [];
            searchHighlights = [];
            document.getElementById('search-input').value = "";
            currentScale = 1.5; // Reset zoom level when loading new PDF
            updateZoomDisplay();
            renderPage(1);
        }

        async function renderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
                return;
            }

            currentPage = num;
            pageRendering = true;
            const container = document.getElementById('pdf-container');
            container.innerHTML = '';

            canvas = document.createElement('canvas');
            container.appendChild(canvas);

            const page = await pdfDoc.getPage(num);
            currentPdfJsPage = page;

            // Use currentScale instead of fixed scale
            viewport = page.getViewport({ scale: currentScale });

            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderContext = {
                canvasContext: canvas.getContext('2d'),
                viewport: viewport
            };

            const renderTask = page.render(renderContext);
            await renderTask.promise;

            pageRendering = false;
            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }
            
            renderHighlights(); 
            renderSearchHighlights();

            document.getElementById('page-info').textContent = `Page ${num} of ${pdfDoc.numPages}`;
            document.getElementById('prev-page').disabled = num <= 1;
            document.getElementById('next-page').disabled = num >= pdfDoc.numPages;

            const searchTerm = document.getElementById('search-input').value;
            if (searchTerm) {
                await searchAndHighlightCurrentPage(searchTerm);
            }
        }

        function renderHighlights() {
            const container = document.getElementById('pdf-container');
            if (!canvas || !container) return;

            document.querySelectorAll('.highlight:not(.temp-highlight)').forEach(el => el.remove());

            const canvasRect = canvas.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();

            const canvasOffsetX = canvasRect.left - containerRect.left + container.scrollLeft;
            const canvasOffsetY = canvasRect.top - containerRect.top + container.scrollTop;

            highlights
                .filter(h => h.page === currentPage - 1)
                .forEach(highlight => {
                    const highlightEl = document.createElement('div');
                    highlightEl.className = 'highlight';
                    
                    // Scale highlight coordinates to match current zoom level
                    const scaleFactor = currentScale / highlight.originalScale;
                    highlightEl.style.left = `${highlight.x * scaleFactor + canvasOffsetX}px`;
                    highlightEl.style.top = `${highlight.y * scaleFactor + canvasOffsetY}px`;
                    highlightEl.style.width = `${highlight.width * scaleFactor}px`;
                    highlightEl.style.height = `${highlight.height * scaleFactor}px`;
                    
                    container.appendChild(highlightEl);
                });
        }

        function renderSearchHighlights() {
            const container = document.getElementById('pdf-container');
            if (!canvas || !container) return;

            document.querySelectorAll('.search-highlight').forEach(el => el.remove());

            const canvasRect = canvas.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();

            const canvasOffsetX = canvasRect.left - containerRect.left + container.scrollLeft;
            const canvasOffsetY = canvasRect.top - containerRect.top + container.scrollTop;

            searchHighlights
                .filter(h => h.page === currentPage - 1)
                .forEach(highlight => {
                    const highlightEl = document.createElement('div');
                    highlightEl.className = 'search-highlight';
                    
                    highlightEl.style.left = `${highlight.x + canvasOffsetX}px`;
                    highlightEl.style.top = `${highlight.y + canvasOffsetY}px`;
                    highlightEl.style.width = `${highlight.width}px`;
                    highlightEl.style.height = `${highlight.height}px`;
                    
                    container.appendChild(highlightEl);
                });
        }

        async function searchAndHighlightCurrentPage(searchTerm) {
            searchHighlights = [];
            if (!searchTerm || !pdfDoc || !canvas || !currentPdfJsPage) {
                renderSearchHighlights();
                return;
            }

            const searchTextLower = searchTerm.toLowerCase();
            const page = currentPdfJsPage;
            const pageIndex = currentPage - 1;

            try {
                const textContent = await page.getTextContent();
                
                textContent.items.forEach(item => {
                    const itemTextLower = item.str.toLowerCase();
                    if (itemTextLower.includes(searchTextLower)) {
                        const [canvasLeft, canvasTop] = viewport.convertToViewportPoint(
                            item.transform[4],
                            item.transform[5] + item.height
                        );
                        const [canvasRight, canvasBottom] = viewport.convertToViewportPoint(
                            item.transform[4] + item.width,
                            item.transform[5]
                        );
                        
                        const highlightX = canvasLeft;
                        const highlightY = canvasTop;
                        const highlightWidth = canvasRight - canvasLeft;
                        const highlightHeight = canvasBottom - canvasTop;

                        searchHighlights.push({
                            page: pageIndex,
                            x: highlightX,
                            y: highlightY,
                            width: highlightWidth,
                            height: highlightHeight
                        });
                    }
                });
                renderSearchHighlights();
            } catch (error) {
                console.error("Error during search:", error);
            }
        }

        async function fullDocumentSearch() {
            searchHighlights = [];
            const searchTerm = document.getElementById('search-input').value.trim();
            if (!searchTerm || !pdfDoc) {
                renderSearchHighlights();
                return;
            }

            const searchTextLower = searchTerm.toLowerCase();

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const textContent = await page.getTextContent();
                const pageViewport = page.getViewport({ scale: currentScale });
                const pageIndex = i - 1;

                textContent.items.forEach(item => {
                    const itemTextLower = item.str.toLowerCase();
                    if (itemTextLower.includes(searchTextLower)) {
                        const [canvasLeft, canvasTop] = pageViewport.convertToViewportPoint(
                            item.transform[4],
                            item.transform[5] + item.height
                        );
                        const [canvasRight, canvasBottom] = pageViewport.convertToViewportPoint(
                            item.transform[4] + item.width,
                            item.transform[5]
                        );
                        
                        const highlightX = canvasLeft;
                        const highlightY = canvasTop;
                        const highlightWidth = canvasRight - canvasLeft;
                        const highlightHeight = canvasBottom - canvasTop;

                        searchHighlights.push({
                            page: pageIndex,
                            x: highlightX,
                            y: highlightY,
                            width: highlightWidth,
                            height: highlightHeight
                        });
                    }
                });
            }
            renderSearchHighlights();
        }

        async function addHighlightsToPdf(pdfDocToModify, pdfJsDocForConversion, highlightsArray, colorRgb, opacity) {
            for (const highlight of highlightsArray) {
                const pageIndex = highlight.page;
                if (pageIndex === undefined || pageIndex >= pdfDocToModify.getPages().length) continue;

                const pdfLibPage = pdfDocToModify.getPages()[pageIndex];
                const pdfJsPage = await pdfJsDocForConversion.getPage(pageIndex + 1);
                const pageViewport = pdfJsPage.getViewport({ scale: 1 });

                // Use the original scale from when the highlight was created
                const originalScale = highlight.originalScale || 1.5;
                const unscaledX1 = highlight.x / originalScale;
                const unscaledY1 = highlight.y / originalScale;
                const unscaledX2 = (highlight.x + highlight.width) / originalScale;
                const unscaledY2 = (highlight.y + highlight.height) / originalScale;

                const [pdfX1, pdfY1] = pageViewport.convertToPdfPoint(unscaledX1, unscaledY1);
                const [pdfX2, pdfY2] = pageViewport.convertToPdfPoint(unscaledX2, unscaledY2);

                pdfLibPage.drawRectangle({
                    x: Math.min(pdfX1, pdfX2),
                    y: Math.min(pdfY1, pdfY2),
                    width: Math.abs(pdfX2 - pdfX1),
                    height: Math.abs(pdfY2 - pdfY1),
                    color: colorRgb,
                    opacity: opacity
                });
            }
        }

        async function savePDFWithHighlight() {
            try {
                const originalPdfBytes = await new Promise((resolve) => {
                    const listener = (event) => {
                        if (event.data.type === "PDF_BYTES_RESPONSE") {
                            window.removeEventListener("message", listener);
                            resolve(new Uint8Array(event.data.pdfBytes));
                        }
                    };
                    window.addEventListener("message", listener);
                    window.parent.postMessage({ type: "REQUEST_PDF_BYTES" }, "*");
                });

                const pdfDocToModify = await PDFLib.PDFDocument.load(originalPdfBytes);
                const pdfJsDocForConversion = pdfDoc;

                await addHighlightsToPdf(pdfDocToModify, pdfJsDocForConversion, highlights, rgb(1, 1, 0), 0.3);
                await addHighlightsToPdf(pdfDocToModify, pdfJsDocForConversion, searchHighlights, rgb(0.529, 0.808, 0.922), 0.4);

                const modifiedPdfBytes = await pdfDocToModify.save();

                window.parent.postMessage({
                    type: "MODIFIED_PDF_BYTES",
                    pdfBytes: Array.from(modifiedPdfBytes)
                }, "*");

            } catch (error) {
                console.error("Error saving PDF:", error);
                window.parent.postMessage({
                    type: "PDF_SAVE_ERROR",
                    error: error.message
                }, "*");
            }
        }

        function zoomIn() {
            // Check if the current scale is less than the maximum zoom level (200% or 2.0)
            if (currentScale < 2.5) {
                currentScale += SCALE_INCREMENT;
                // Clamp the value to ensure it doesn't go over 2.0
                if (currentScale > 2.5) {
                    currentScale = 2.5;
                }
                updateZoomDisplay();
                renderPage(currentPage);
            }
        }

        function zoomOut() {
            if (currentScale > SCALE_INCREMENT) {
                currentScale -= SCALE_INCREMENT;
                updateZoomDisplay();
                renderPage(currentPage);
            }
        }

        function resetZoom() {
            currentScale = 1.5;
            updateZoomDisplay();
            renderPage(currentPage);
        }

        function updateZoomDisplay() {
            document.getElementById('zoom-level').textContent = `${Math.round(currentScale * 100)}%`;
        }

        function setupEventHandlers() {
            const pdfContainer = document.getElementById('pdf-container');
            const searchInput = document.getElementById('search-input');
            const searchBtn = document.getElementById('search-btn');

            document.getElementById('prev-page').addEventListener('click', () => {
                if (pdfDoc && currentPage > 1) renderPage(currentPage - 1);
            });

            document.getElementById('next-page').addEventListener('click', () => {
                if (pdfDoc && currentPage < pdfDoc.numPages) renderPage(currentPage + 1);
            });

            document.getElementById('highlight-btn').addEventListener('click', function() {
                isHighlightMode = !isHighlightMode;
                this.classList.toggle('active', isHighlightMode);
            });

            searchBtn.addEventListener('click', fullDocumentSearch);

            searchInput.addEventListener('input', () => {
                if (!searchInput.value.trim()) {
                    searchHighlights = [];
                    renderSearchHighlights();
                }
            });

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    fullDocumentSearch();
                }
            });

            // Zoom controls
            document.getElementById('zoom-in').addEventListener('click', zoomIn);
            document.getElementById('zoom-out').addEventListener('click', zoomOut);
            
            // Keyboard shortcuts for zoom
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === '+' || e.key === '=') {
                        e.preventDefault();
                        zoomIn();
                    } else if (e.key === '-') {
                        e.preventDefault();
                        zoomOut();
                    } else if (e.key === '0') {
                        e.preventDefault();
                        resetZoom();
                    }
                }
            });

            pdfContainer.addEventListener('mousedown', (e) => {
                if (e.target === canvas && isHighlightMode) {
                    isHighlighting = true;
                    const rect = canvas.getBoundingClientRect();
                    highlightStartX = e.clientX - rect.left;
                    highlightStartY = e.clientY - rect.top;
                    e.preventDefault();

                    tempHighlightEl = document.createElement('div');
                    tempHighlightEl.className = 'highlight temp-highlight';
                    const containerRect = pdfContainer.getBoundingClientRect();
                    const canvasOffsetX = rect.left - containerRect.left + pdfContainer.scrollLeft;
                    const canvasOffsetY = rect.top - containerRect.top + pdfContainer.scrollTop;
                    tempHighlightEl.style.left = `${highlightStartX + canvasOffsetX}px`;
                    tempHighlightEl.style.top = `${highlightStartY + canvasOffsetY}px`;
                    tempHighlightEl.style.width = '0px';
                    tempHighlightEl.style.height = '0px';
                    pdfContainer.appendChild(tempHighlightEl);
                }
            });

            pdfContainer.addEventListener('mousemove', (e) => {
                if (isHighlighting && e.target === canvas && tempHighlightEl) {
                    const rect = canvas.getBoundingClientRect();
                    const currentX = e.clientX - rect.left;
                    const currentY = e.clientY - rect.top;

                    const containerRect = pdfContainer.getBoundingClientRect();
                    const canvasOffsetX = rect.left - containerRect.left + pdfContainer.scrollLeft;
                    const canvasOffsetY = rect.top - containerRect.top + pdfContainer.scrollTop;

                    tempHighlightEl.style.left = `${Math.min(highlightStartX, currentX) + canvasOffsetX}px`;
                    tempHighlightEl.style.top = `${Math.min(highlightStartY, currentY) + canvasOffsetY}px`;
                    tempHighlightEl.style.width = `${Math.abs(currentX - highlightStartX)}px`;
                    tempHighlightEl.style.height = `${Math.abs(currentY - highlightStartY)}px`;
                    
                    e.preventDefault();
                }
            });

            pdfContainer.addEventListener('mouseup', (e) => {
                if (isHighlighting) {
                    isHighlighting = false;
                    const rect = canvas.getBoundingClientRect();
                    const endX = e.clientX - rect.left;
                    const endY = e.clientY - rect.top;

                    if (tempHighlightEl) {
                        tempHighlightEl.remove();
                        tempHighlightEl = null;
                    }

                    if (Math.abs(endX - highlightStartX) > 5 && Math.abs(endY - highlightStartY) > 5) {
                        const highlight = {
                            page: currentPage - 1,
                            x: Math.min(highlightStartX, endX),
                            y: Math.min(highlightStartY, endY),
                            width: Math.abs(endX - highlightStartX),
                            height: Math.abs(endY - highlightStartY),
                            originalScale: currentScale // Store the scale when highlight was created
                        };
                        highlights.push(highlight);
                        renderHighlights();
                    }
                    e.preventDefault();
                }
            });

            document.getElementById('save-pdf').addEventListener('click', async () => {
                window.parent.postMessage({
                    type: "HIGHLIGHTS_UPDATED",
                    highlights: highlights
                }, "*");
                await savePDFWithHighlight();
            });

            pdfContainer.addEventListener('scroll', () => {
                if (canvas) {
                    renderHighlights();
                    renderSearchHighlights();
                }
            });
        }

        setupEventHandlers();
    </script>
</body>
</html>
